<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4월 14일, 특별한 초대장 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            background-color: #ffe0e9;
            background-image: url('photo1.jpg'); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            font-family: 'Pretendard', sans-serif; overflow: hidden; position: relative;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 1;
        }

        .container { 
            position: relative; padding: 40px 20px; z-index: 10;
            background: rgba(255, 255, 255, 0.9); border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center;
        }

        h1 { font-size: 1.6rem; color: #ff758f; margin-bottom: 25px; line-height: 1.5; }
        .emoji { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        .btn-group { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; height: 60px; }

        button {
            padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yesBtn { background-color: #ff758f; color: white; }
        #noBtn { background-color: #adb5bd; color: white; transition: transform 0.1s; }

        /* 모달: 초기에는 절대 보이지 않게 !important 추가 */
        #successModal {
            display: none !important; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; height: 70vh; min-height: 500px;
            padding: 50px 30px; border-radius: 40px; z-index: 2000;
            background-image: url('photo2.jpg'); background-size: cover; background-position: center;
            overflow: hidden; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid white;
        }

        #successModal::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.65); z-index: -1;
        }

        #successModal h2 { color: #ff758f; font-size: 1.8rem; line-height: 1.6; z-index: 2001; word-break: keep-all; }
        #successModal p { margin-top: 25px; font-size: 1.2rem; font-weight: bold; color: #444; z-index: 2001; margin-bottom: 40px; }

        .reset-btn { background-color: white; color: #ff758f; border: 2.5px solid #ff758f; font-size: 1rem; padding: 12px 30px; z-index: 2001; }
    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">🌸</span>
        <h1>4월 14일 우리<br>양재천 데이트할래?</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="showLove()">좋아!</button>
            <button id="noBtn" onmouseover="escape()" ontouchstart="escape()">싫어..</button>
        </div>
    </div>

    <!-- 인라인 스타일로도 한 번 더 확실하게 숨김 처리 -->
    <div id="successModal" style="display: none !important;">
        <span style="font-size: 3.5rem; z-index: 2001; margin-bottom: 20px;">✨🌸✨</span>
        <h2 style="margin-top: 15px;">그럼 양재천 가서<br>재밌게 데이트하자!</h2>
        <p>약속 완료! ❤️</p>
        <button class="reset-btn" onclick="resetPage()">다시 선택하기</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const modal = document.getElementById('successModal');

        function escape() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px'; noBtn.style.top = y + 'px'; noBtn.style.zIndex = "1000";
            const currentScale = parseFloat(noBtn.style.transform.replace(/[^0-9.]/g, '')) || 1;
            if(currentScale > 0.4) noBtn.style.transform = `scale(${currentScale * 0.9})`;
        }

        function showLove() {
            confetti({
                particleCount: 150, spread: 100, origin: { y: 0.6 },
                colors: ['#ffb7c5', '#ff99aa', '#ffffff'], zIndex: 3000
            });
            // !important를 이기기 위해 인라인 스타일로 직접 접근
            modal.style.setProperty('display', 'flex', 'important');
        }

        function resetPage() {
            modal.style.setProperty('display', 'none', 'important');
            noBtn.style.position = 'static';
            noBtn.style.transform = 'scale(1)';
            noBtn.style.left = 'auto'; noBtn.style.top = 'auto';
        }
    </script>
</body>
</html>
